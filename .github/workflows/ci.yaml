---
name: ci
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  pull-requests: read

env:
  # Operator-only tools that need YubiKey hardware or libpcsclite
  MISE_DISABLE_TOOLS: pipx:yubikey-manager,aqua:str4d/age-plugin-yubikey

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sops-sanity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: ./scripts/sops-sanity.sh

  flux-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: |
          token=clusters/shire/infrastructure/controllers/cloudflared-tunnel-token.sops.yaml
          if [[ ! -f "$token" ]]; then
            echo "::warning::$token not committed yet; skipping flux-build"
            exit 0
          fi
          flux build kustomization infrastructure \
            --path clusters/shire/infrastructure/controllers \
            --kustomization-file clusters/shire/infrastructure.yaml \
            --dry-run

  tofu-validate:
    runs-on: ubuntu-24.04
    env:
      # Dummy creds so the s3 backend's credential resolver doesn't error
      AWS_ACCESS_KEY_ID: ci
      AWS_SECRET_ACCESS_KEY: ci
      TF_VAR_encryption_passphrase: ci
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tofu-plugins-${{ hashFiles('tofu/.terraform.lock.hcl', 'tofu/providers.tf') }}
      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - run: tofu -chdir=tofu fmt -check -recursive
      - run: tofu -chdir=tofu init -backend=false
      - run: tofu -chdir=tofu validate
