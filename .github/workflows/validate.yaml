---
name: validate
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sops-sanity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: |
          pre-commit run --all-files sops-verify
          pre-commit run --all-files no-plaintext-secrets

  flux-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: |
          # The tunnel-token Secret is generated by `tofu-secrets-sync`
          # after the first apply, so it's absent on a pre-rebuild
          # branch. Skip flux-build until it lands — the operator commits
          # it in the same push as the first bootstrap.
          token=clusters/shire/infrastructure/controllers/cloudflared-tunnel-token.sops.yaml
          if [[ ! -f "$token" ]]; then
            echo "::warning::$token not committed yet; skipping flux-build"
            exit 0
          fi
          flux build kustomization infrastructure \
            --path clusters/shire/infrastructure/controllers \
            --kustomization-file clusters/shire/infrastructure.yaml \
            --dry-run

  tofu-validate:
    runs-on: ubuntu-24.04
    env:
      # Dummy creds so the s3 backend's credential resolver doesn't error
      # during init -backend=false. No real state is touched.
      AWS_ACCESS_KEY_ID: validate
      AWS_SECRET_ACCESS_KEY: validate
      TF_VAR_encryption_passphrase: validate
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tofu-plugins-${{ hashFiles('tofu/.terraform.lock.hcl', 'tofu/providers.tf') }}
      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - run: tofu -chdir=tofu fmt -check -recursive
      - run: tofu -chdir=tofu init -backend=false
      - run: tofu -chdir=tofu validate
