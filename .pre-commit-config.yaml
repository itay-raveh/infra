---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks-system
        # Upstream forgot this on `gitleaks-system` (the `gitleaks` and
        # `gitleaks-docker` variants have it). Without it pre-commit
        # pipes changed-file paths as positional args and gitleaks
        # rejects >1.
        pass_filenames: false

  - repo: local
    hooks:
      - id: sops-sanity
        name: sops-sanity
        language: system
        entry: scripts/sops-sanity.sh
        pass_filenames: false
        always_run: true

      - id: yamllint
        name: yamllint
        language: system
        entry: yamllint
        types: [yaml]
        # Second pattern: vendored upstream manifest, upstream indentation
        # style differs from ours; lint upstream's problem, not ours.
        exclude: '\.sops\.(yaml|yml)$|^clusters/shire/infrastructure/controllers/barman-cloud-plugin/manifest\.yaml$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.2.2
    hooks:
      - id: tofu_fmt
