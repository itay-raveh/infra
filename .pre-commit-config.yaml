repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: sops-verify
        name: Verify SOPS-named files are encrypted
        language: system
        entry: bash -c 'for f in "$@"; do grep -q "^sops:" "$f" || { echo "not SOPS-encrypted: $f" >&2; exit 1; }; done' --
        files: '\.sops\.(yaml|json)$|bootstrap/cluster-age\.key\.sops$|tofu/encryption-passphrase\.sops\.txt$'

  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.2.2
    hooks:
      - id: tofu_fmt

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        exclude: '(\.sops\.(yaml|yml)$|^docs/design\.md$)'
