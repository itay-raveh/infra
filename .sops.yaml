x-yubis-only: &yubis_only >-
  age1yubikey1qvpg35e0zwywyj7w6dv53yewum6mpr0mzkekpcr02mvzrrtml3zmumwhqae,
  age1yubikey1qvcujpaxamuraf4neev9xcxgj40e5x54n5a8kz0xvg3fpcnl6p48xsgkyg4

creation_rules:
  # Cluster-tree Secrets: encrypt only data/stringData so Kubernetes can
  # still read apiVersion/kind/metadata.
  - path_regex: clusters/.*\.sops\.(yaml|json)$
    encrypted_regex: '^(data|stringData)$'
    age: >-
      age1yubikey1qvpg35e0zwywyj7w6dv53yewum6mpr0mzkekpcr02mvzrrtml3zmumwhqae,
      age1yubikey1qvcujpaxamuraf4neev9xcxgj40e5x54n5a8kz0xvg3fpcnl6p48xsgkyg4,
      age1dhztnm2nhdpcwsuv8uz6ss05tdx4jyfhm22dltu9l4u4fu8v3a4qs5asa7

  - path_regex: tofu/secrets\.sops\.yaml$
    age: *yubis_only

  # The cluster software key cannot decrypt itself.
  - path_regex: bootstrap/cluster-age-key\.sops\.txt$
    age: *yubis_only
