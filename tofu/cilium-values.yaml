# wg0 cannot accept native XDP. Best-effort still attaches it to eth0 and eth1.
# https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/#loadbalancer-nodeport-xdp-acceleration
---
operator:
  replicas: 1
  prometheus:
    serviceMonitor:
      enabled: false
ipam:
  mode: kubernetes
routingMode: native
ipv4NativeRoutingCIDR: 10.0.16.0/20
kubeProxyReplacement: true
bpf:
  masquerade: false
loadBalancer:
  acceleration: best-effort
encryption:
  enabled: false
  type: wireguard
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
hubble:
  enabled: false
prometheus:
  serviceMonitor:
    enabled: false
    trustCRDsExist: false
