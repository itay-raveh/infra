[extend]
useDefault = true

# Singular [allowlist] (not [[allowlists]]): gitleaks-action@v2 pins an
# older binary that predates the array-of-tables form (added in 8.25).
[allowlist]
description = "SOPS ciphertext + vendored upstream manifests"
paths = [
  '''\.sops\.(yaml|json|txt)$''',
  # cnpg plugin-barman-cloud release manifest ships a kind:Secret holding
  # only a base64 public image ref. Re-verify on each plugin version bump.
  '''^clusters/shire/infrastructure/controllers/barman-cloud-plugin/manifest\.yaml$''',
]
