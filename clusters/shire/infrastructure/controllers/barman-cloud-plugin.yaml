---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: barman-cloud-plugin
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cnpg-system
  dependsOn:
    - name: cert-manager
    - name: cnpg
  chart:
    spec:
      chart: plugin-barman-cloud
      version: 0.6.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    additionalArgs:
      - --log-level=info
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
