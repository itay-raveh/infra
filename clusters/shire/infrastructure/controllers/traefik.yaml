---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      version: 39.0.7
      sourceRef:
        kind: HelmRepository
        name: traefik
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: traefik
    # Cloudflare tunnel reaches Traefik in-cluster  - no LoadBalancer needed.
    service:
      type: ClusterIP
