---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.kubito.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: cloudflared
  chart:
    spec:
      chart: cloudflared
      version: 1.7.7
      sourceRef:
        kind: HelmRepository
        name: cloudflared
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    managed:
      existingSecret: cloudflared-tunnel-token
