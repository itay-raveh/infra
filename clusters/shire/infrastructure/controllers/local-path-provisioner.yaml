---
apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.containeroo.ch
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: local-path-storage
  chart:
    spec:
      chart: local-path-provisioner
      version: 0.0.36
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    storageClass:
      defaultClass: true
      # Retain so a stuck PVC delete never silently nukes data on the
      # local disk  - operator must clean up by hand.
      reclaimPolicy: Retain
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/local-path-provisioner
