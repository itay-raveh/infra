---
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: headlamp
  chart:
    spec:
      chart: headlamp
      version: 0.41.x
      sourceRef:
        kind: HelmRepository
        name: headlamp
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: headlamp
    replicaCount: 1
    # cluster-admin until P1-2c (Tailscale operator apiserver-proxy auth)
    # lands and rethinks access. view works for namespaced reads but
    # upstream view omits cluster-scoped resources by design; a
    # hand-rolled cluster-reader role isn't an established pattern in
    # public repos.
    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin
    config:
      inClusterContextName: shire
      pluginsDir: /build/plugins
      sessionTTL: 86400
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
          privileged: false
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /build/plugins
    volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: headlamp
      port:
        number: 80
  tls:
    - hosts:
        - headlamp
