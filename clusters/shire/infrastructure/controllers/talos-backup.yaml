---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: talos-backup
  namespace: kube-system
spec:
  roles:
    - os:etcd:backup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: talos-backup
  namespace: kube-system
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: talos-backup
              image: ghcr.io/siderolabs/talos-backup:v0.1.0-beta.3-8-g23b65b0
              workingDir: /tmp
              command: ["/talos-backup"]
              env:
                - name: BUCKET
                  value: "shire-backups"
                - name: S3_PREFIX
                  value: "etcd"
                - name: CLUSTER_NAME
                  value: "shire"
                - name: AWS_REGION
                  value: "fsn1"
                - name: CUSTOM_S3_ENDPOINT
                  value: "https://fsn1.your-objectstorage.com"
                - name: USE_PATH_STYLE
                  value: "true"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-creds
                      key: ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-backup-creds
                      key: SECRET_ACCESS_KEY
                - name: AGE_X25519_PUBLIC_KEY
                  value: "age19kh3g33c56nmwt5ac5ntyvc2yamfz0txyzmlfpdqum2apq92pq9qeduku6"
                - name: ENABLE_COMPRESSION
                  value: "true"
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - mountPath: /tmp
                  name: tmp
                - mountPath: /.talos
                  name: talos
                - mountPath: /var/run/secrets/talos.dev
                  name: talos-secrets
          restartPolicy: OnFailure
          volumes:
            - name: tmp
              emptyDir: {}
            - name: talos
              emptyDir: {}
            - name: talos-secrets
              secret:
                secretName: talos-backup
