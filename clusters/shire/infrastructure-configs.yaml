# Custom resources that depend on CRDs installed by the infrastructure
# Kustomization's HelmReleases. Split out so the infrastructure
# Kustomization's dry-run doesn't fail on CRs whose CRDs aren't yet
# present.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/shire/infrastructure/configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infrastructure
  wait: true
  timeout: 10m
