apiVersion: batch/v1
kind: CronJob
metadata:
  name: wanderbound-data-backup
  namespace: wanderbound
spec:
  schedule: "30 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: restic/restic:0.18.1
              command:
                - /bin/sh
                - -c
                - |
                  restic backup /data --verbose &&
                  restic forget \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 3 \
                    --prune
              env:
                - name: RESTIC_REPOSITORY
                  value: "s3:https://fsn1.your-objectstorage.com/shire-backups/app-data/wanderbound"
                - name: RESTIC_CACHE_DIR
                  value: "/tmp/cache"
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: wanderbound-secrets
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-s3-creds
                      key: ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cnpg-s3-creds
                      key: ACCESS_SECRET_KEY
              volumeMounts:
                - name: app-data
                  mountPath: /data
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: app-data
              persistentVolumeClaim:
                claimName: wanderbound-app-data
            - name: tmp
              emptyDir: {}
          restartPolicy: OnFailure
