apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderbound-frontend
  namespace: wanderbound
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wanderbound-frontend
  template:
    metadata:
      labels:
        app: wanderbound-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/itay-raveh/wanderbound-frontend:latest@sha256:a5da8ac9f9851daf35094e0996deaa5580dea64e42cc4a963d97bae2a0aaa7b5 # {"$imagepolicy": "flux-system:wanderbound-frontend"}
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_HOST
              value: "wanderbound-backend"
            - name: UPLOAD_S3_BROWSER_ORIGIN
              value: "https://wanderbound-uploads-raveh-dev.fsn1.your-objectstorage.com"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 10
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-conf
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
