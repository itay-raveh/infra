---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: wanderbound-db
  namespace: wanderbound
spec:
  instances: 1

  bootstrap:
    initdb:
      database: wanderbound
      owner: app

  storage:
    size: 5Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1"

  postgresql:
    parameters:
      shared_buffers: "128MB"
      work_mem: "8MB"

  backup:
    barmanObjectStore:
      destinationPath: "s3://shire-backups/cnpg/wanderbound/"
      endpointURL: "https://fsn1.your-objectstorage.com"
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
