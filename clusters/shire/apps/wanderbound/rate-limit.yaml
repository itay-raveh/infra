apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wanderbound-demo-limit
  namespace: wanderbound
spec:
  rateLimit:
    average: 2
    period: 1m
    burst: 2
    sourceCriterion:
      requestHeaderName: CF-Connecting-IP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wanderbound-media-limit
  namespace: wanderbound
spec:
  rateLimit:
    average: 60
    period: 1s
    burst: 120
    sourceCriterion:
      requestHeaderName: CF-Connecting-IP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wanderbound-api-limit
  namespace: wanderbound
spec:
  rateLimit:
    average: 10
    period: 1s
    burst: 30
    sourceCriterion:
      requestHeaderName: CF-Connecting-IP
