---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: wanderbound
  namespace: flux-system
spec:
  image: ghcr.io/itay-raveh/wanderbound
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: wanderbound
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: wanderbound
  filterTags:
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  policy:
    semver:
      range: '>=0.0.0'
  digestReflectionPolicy: IfNotPresent
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: wanderbound
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@raveh.dev
        name: flux
      messageTemplate: 'deploy: update wanderbound container image'
    push:
      branch: flux-image-automation
  update:
    path: ./clusters/shire/apps/wanderbound
    strategy: Setters
