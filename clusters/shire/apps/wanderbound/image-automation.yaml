---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: wanderbound-frontend
  namespace: flux-system
spec:
  image: ghcr.io/itay-raveh/wanderbound-frontend
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: wanderbound-backend
  namespace: flux-system
spec:
  image: ghcr.io/itay-raveh/wanderbound-backend
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: wanderbound-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: wanderbound-frontend
  filterTags:
    pattern: '^v(?P<version>(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.0.0'
  digestReflectionPolicy: IfNotPresent
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: wanderbound-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: wanderbound-backend
  filterTags:
    pattern: '^v(?P<version>(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.0.0'
  digestReflectionPolicy: IfNotPresent
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: wanderbound
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@raveh.dev
        name: flux
      messageTemplate: 'deploy: update wanderbound container images'
    push:
      branch: flux-image-automation
  update:
    path: ./clusters/shire/apps/wanderbound
    strategy: Setters
