apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderbound-backend
  namespace: wanderbound
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wanderbound-backend
  template:
    metadata:
      labels:
        app: wanderbound-backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
      initContainers:
        - name: migrations
          image: ghcr.io/itay-raveh/wanderbound-backend:latest@sha256:e08375dcee9646e49f778b191ed351e6b905fd10f289061c47e96f56d0397930 # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      containers:
        - name: backend
          image: ghcr.io/itay-raveh/wanderbound-backend:latest@sha256:e08375dcee9646e49f778b191ed351e6b905fd10f289061c47e96f56d0397930 # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
          ports:
            - containerPort: 8000
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
            - name: ENVIRONMENT
              value: "production"
            - name: VITE_FRONTEND_URL
              value: "https://wanderbound.raveh.dev"
            - name: DATA_FOLDER
              value: "/data"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: app-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-secrets
          secret:
            secretName: wanderbound-secrets
        - name: app-data
          persistentVolumeClaim:
            claimName: wanderbound-app-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
