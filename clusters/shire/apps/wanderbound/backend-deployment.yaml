apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderbound-backend
  namespace: wanderbound
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wanderbound-backend
  template:
    metadata:
      labels:
        app: wanderbound-backend
    spec:
      initContainers:
        - name: migrations
          image: ghcr.io/itay-raveh/wanderbound-backend:latest # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_SERVER
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: dbname
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: SECRET_KEY
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: backend
          image: ghcr.io/itay-raveh/wanderbound-backend:latest # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_SERVER
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: dbname
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: SECRET_KEY
            - name: VITE_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: VITE_GOOGLE_CLIENT_ID
            - name: VITE_MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: VITE_MICROSOFT_CLIENT_ID
            - name: VITE_MAPBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: VITE_MAPBOX_TOKEN
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: wanderbound-secrets
                  key: SENTRY_DSN
            - name: ENVIRONMENT
              value: "production"
            - name: VITE_FRONTEND_URL
              value: "https://wanderbound.raveh.dev"
            - name: DATA_FOLDER
              value: "/data"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: wanderbound-app-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
