apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderbound-backend
  namespace: wanderbound
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wanderbound-backend
  template:
    metadata:
      labels:
        app: wanderbound-backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
      initContainers:
        - name: migrations
          image: ghcr.io/itay-raveh/wanderbound-backend:latest@sha256:43852e8957640fd549fa5c60adafb8ff214b5f01cd4f68324fe1065072cdf836 # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      containers:
        - name: backend
          image: ghcr.io/itay-raveh/wanderbound-backend:latest@sha256:43852e8957640fd549fa5c60adafb8ff214b5f01cd4f68324fe1065072cdf836 # {"$imagepolicy": "flux-system:wanderbound-backend"}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
          ports:
            - containerPort: 8000
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
            - name: ENVIRONMENT
              value: "production"
            - name: VITE_FRONTEND_URL
              value: "https://wanderbound.raveh.dev"
            - name: DATA_FOLDER
              value: "/data"
            - name: UPLOAD_S3_BUCKET
              value: "wanderbound-uploads-raveh-dev"
            - name: UPLOAD_S3_REGION
              value: "fsn1"
            - name: UPLOAD_S3_INTERNAL_ENDPOINT_URL
              value: "https://fsn1.your-objectstorage.com"
            - name: UPLOAD_S3_PUBLIC_ENDPOINT_URL
              value: "https://fsn1.your-objectstorage.com"
            - name: UPLOAD_S3_ADDRESSING_STYLE
              value: "virtual"
            - name: UPLOAD_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: wanderbound-upload-s3-creds
                  key: ACCESS_KEY_ID
            - name: UPLOAD_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: wanderbound-upload-s3-creds
                  key: SECRET_ACCESS_KEY
            - name: UPLOAD_S3_PRESIGN_TTL_SECONDS
              value: "900"
            - name: UPLOAD_PART_SIZE_BYTES
              value: "67108864"
            - name: UPLOAD_SESSION_TTL_SECONDS
              value: "86400"
            - name: MAX_STORAGE_BYTES
              value: "21474836480"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets
              readOnly: true
            - name: app-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-secrets
          secret:
            secretName: wanderbound-secrets
        - name: app-data
          persistentVolumeClaim:
            claimName: wanderbound-app-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
