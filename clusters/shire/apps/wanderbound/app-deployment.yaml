apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderbound-app
  namespace: wanderbound
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wanderbound-app
  template:
    metadata:
      labels:
        app: wanderbound-app
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
      initContainers:
        - name: sourcemaps
          image: ghcr.io/itay-raveh/wanderbound-sourcemaps
          envFrom:
            - secretRef:
                name: wanderbound-sourcemaps-secrets
          env:
            - name: SENTRY_ORG
              valueFrom:
                configMapKeyRef:
                  name: wanderbound-config
                  key: SENTRY_ORG
            - name: SENTRY_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: wanderbound-config
                  key: SENTRY_PROJECT
            - name: HOME
              value: /tmp
            - name: SENTRY_DISABLE_UPDATE_CHECK
              value: "true"
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: migrations
          image: ghcr.io/itay-raveh/wanderbound
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: wanderbound-config
            - secretRef:
                name: wanderbound-secrets
            - secretRef:
                name: wanderbound-upload-s3-creds
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: app
          image: ghcr.io/itay-raveh/wanderbound
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: wanderbound-config
            - secretRef:
                name: wanderbound-secrets
            - secretRef:
                name: wanderbound-upload-s3-creds
          env:
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: wanderbound-db-app
                  key: uri
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app-data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: wanderbound-app-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
