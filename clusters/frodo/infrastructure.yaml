---
# The single Flux Kustomization at cluster root. Reconciles the
# infrastructure/ subtree against the in-cluster API and decrypts
# any *.sops.yaml file it encounters using the cluster software age
# key (installed once during bootstrap as the sops-age Secret in
# flux-system, see design.md §6.B step 6). Phase 2 (§16) adds an
# apps Kustomization here that dependsOn this one.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/frodo/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 5m
