---
# Cluster-root Flux Kustomization. Reconciles the infrastructure/
# subtree and decrypts any *.sops.yaml it encounters using the
# sops-age Secret installed in flux-system during bootstrap.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/frodo/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  timeout: 5m
