---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 1h
  targetNamespace: cloudflared
  chart:
    spec:
      chart: cloudflared
      version: 1.7.7
      sourceRef:
        kind: HelmRepository
        name: cloudflared
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 2
    logLevel: info
    metrics:
      enabled: false
    managed:
      enabled: true
      existingSecret: cloudflared-tunnel-token
    local:
      enabled: false
