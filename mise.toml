[tools]
opentofu = "latest"

# Load credentials from .env (gitignored). Copy .env.example to .env and fill in values.
[env]
_.file = ".env"

[tasks.plan]
description = "Preview infrastructure changes"
run = "cd tofu && tofu plan"

[tasks.apply]
description = "Provision or update infrastructure"
run = "cd tofu && tofu apply"

[tasks.ssh]
description = "SSH into frodo"
run = "ssh root@$(cd tofu && tofu output -raw server_ip)"

[tasks.tunnel]
description = "Open SSH tunnel to Dokploy UI (http://localhost:3000)"
run = "ssh -N -L 3000:localhost:3000 root@$(cd tofu && tofu output -raw server_ip)"

[tasks.destroy]
description = "Tear down all infrastructure (DESTRUCTIVE)"
run = "cd tofu && tofu destroy"
