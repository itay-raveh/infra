min_version = "2026.4.8"

[env]
TF_VAR_ssh_public_key_path = "~/.ssh/id_ed25519_sk.pub"

[tools]
age = "1"
bats = "1.13.0"
# 0.5.0 is the last upstream release with a Linux binary
"aqua:str4d/age-plugin-yubikey" = "0.5.0"
"aqua:cloudnative-pg/cloudnative-pg/kubectl-cnpg" = "1.30.0"
flux2 = "2.9.1"
gh = "2.96.0"
gitleaks = "8"
hcloud = "1"
jq = "1.8.2"
k9s = "0.51.0"
kubectl = "1.36.2"
mc = "RELEASE.2025-08-13T08-35-41Z"
opentofu = "1.12.4"
"pipx:yamllint" = "1.38.0"
"pipx:yubikey-manager" = "5.9.2"
prek = "0.4.10"
shellcheck = "0.11"
sops = "3"
talosctl = "1.12.8"
yq = "4.53.3"

# -- Tofu ---------------------------------------------------------
# All secrets live in tofu/secrets.sops.yaml and are injected as env
# vars via scripts/tofu-wrapper.sh
#
# When rops gains age-plugin support (gibbz00/rops#17), replace the
# wrapper with a single line in [env]:
#   _.file = "tofu/secrets.sops.yaml"

[tasks."tofu:init"]
description = "tofu init with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh init \"$@\""

[tasks."tofu:plan"]
description = "tofu plan with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh plan \"$@\""

[tasks."tofu:apply"]
description = "tofu apply with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh apply \"$@\""

[tasks."tofu:destroy"]
description = "Destroy all tofu-managed resources"
dir = "{{config_root}}"
confirm = "This will destroy ALL tofu-managed infrastructure. Continue?"
run = "bash scripts/tofu-wrapper.sh destroy \"$@\""

[tasks."tofu:output"]
description = "Decrypt state and dump a tofu output to stdout"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh output -raw \"$@\""

[tasks."configs:refresh"]
description = "Refresh ~/.kube/config and ~/.talos/config from tofu state"
dir = "{{config_root}}"
run = """
mkdir -p ~/.kube ~/.talos
bash scripts/tofu-wrapper.sh output -raw kubeconfig > ~/.kube/config
chmod 600 ~/.kube/config
bash scripts/tofu-wrapper.sh output -raw talosconfig > ~/.talos/config
chmod 600 ~/.talos/config
private_ipv4=$(bash scripts/tofu-wrapper.sh output -raw private_ipv4)
talosctl config node "$private_ipv4"
"""

[tasks.test]
description = "Run the offline repository test suite"
run = "bats tests"

[tasks."wireguard:configure"]
description = "Install and activate the private management tunnel"
dir = "{{config_root}}"
file = "scripts/configure-wireguard.sh"

[tasks."wireguard:recover"]
description = "Recover the node-side tunnel through a temporary public Talos API rule"
dir = "{{config_root}}"
file = "scripts/recover-wireguard.sh"

# -- Flux ---------------------------------------------------------

[tasks.reconcile]
description = "Force Flux to pull from git"
run = "flux reconcile source git flux-system && flux reconcile kustomization flux-system"

[tasks."flux:sync-hr"]
description = "Sync a single HelmRelease (usage: mise run flux:sync-hr -- -n <namespace> <name>)"
run = "flux reconcile helmrelease \"$@\""

[tasks."flux:sync-ks"]
description = "Sync a single Kustomization"
run = "flux reconcile kustomization \"$@\""

[tasks."flux:unhealthy"]
description = "Show Flux resources not ready"
run = "flux get all -A --status-selector ready=false"

# -- Cluster inspection -------------------------------------------

[tasks."wanderbound:psql"]
description = "Open a psql shell in the Wanderbound database"
run = "kubectl cnpg psql -n wanderbound wanderbound-db -- wanderbound"
raw = true

[tasks.nodes]
description = "List cluster nodes"
run = "kubectl get nodes -o wide"

[tasks.pods]
description = "List all pods across namespaces"
run = "kubectl get pods -A"

[tasks.unhealthy]
description = "Show pods not in Running/Succeeded state"
run = "kubectl get pods -A --field-selector status.phase!=Running,status.phase!=Succeeded"

[tasks."prune:pods"]
description = "Delete Failed/Succeeded pods"
run = [
    "kubectl delete pods -A --field-selector status.phase==Failed --ignore-not-found",
    "kubectl delete pods -A --field-selector status.phase==Succeeded --ignore-not-found",
]

[tasks.klogs]
description = "Tail logs for a deployment (usage: mise run klogs -- -n <namespace> deploy/<name>)"
run = "kubectl logs -f --all-containers \"$@\""
raw = true

[tasks.kshell]
description = "Open a debug shell on a node (usage: mise run kshell -- <node-name>)"
run = "kubectl debug -it --image=alpine \"node/$1\" -- sh"
raw = true

# -- SOPS-encrypted Secrets sourced from tofu ---------------------
# Each task: pull a token, pipe to scripts/refresh-sops-secret.sh which
# renders + encrypts the target file in place. Commit yourself.

[tasks."tunnel:refresh"]
description = "Regenerate cloudflared tunnel-token Secret from tofu output"
dir = "{{config_root}}"
run = """
bash scripts/tofu-wrapper.sh output -raw tunnel_token \
  | bash scripts/refresh-sops-secret.sh \
      clusters/shire/infrastructure/controllers/cloudflared-tunnel-token.sops.yaml \
      cloudflared cloudflared-tunnel-token cf-tunnel-token
"""

[tasks."hcloud-csi:refresh-token"]
description = "Regenerate hcloud-csi Secret from tofu secrets.sops.yaml"
dir = "{{config_root}}"
run = """
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
printf '%s' "$TF_VAR_hcloud_token" \
  | bash scripts/refresh-sops-secret.sh \
      clusters/shire/infrastructure/controllers/hcloud-csi-token.sops.yaml \
      kube-system hcloud token
"""

[tasks."tailscale-operator:refresh-oauth"]
description = "Regenerate tailscale-operator OAuth Secret from tofu output (re-run after -replace on the oauth_client)"
dir = "{{config_root}}"
run = """
target=clusters/shire/infrastructure/controllers/tailscale-operator-oauth.sops.yaml
client_id=$(bash scripts/tofu-wrapper.sh output -raw tailscale_operator_oauth_client_id)
client_secret=$(bash scripts/tofu-wrapper.sh output -raw tailscale_operator_oauth_client_secret)
kubectl create secret generic operator-oauth \
  --namespace=tailscale \
  --from-literal=client_id="$client_id" \
  --from-literal=client_secret="$client_secret" \
  --dry-run=client -o yaml > "$target"
sops --encrypt --in-place "$target"
echo "wrote $target - review, commit, and push when ready" >&2
"""

# -- Rebuild ------------------------------------------------------

[tasks.rebuild]
description = "Full rebuild: image + infra + tunnel token + Flux + SOPS age key"
dir = "{{config_root}}"
confirm = "This will tear down and rebuild the entire cluster. Continue?"
file = "scripts/rebuild.sh"
