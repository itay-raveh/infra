min_version = "2026.4.8"

[env]
TF_VAR_ssh_public_key_path = "~/.ssh/id_ed25519_sk.pub"

[tools]
age = "1.3.1"
# 0.5.0 is the last upstream release with a Linux binary; 0.5.1 shipped
# only darwin/windows assets.
"aqua:str4d/age-plugin-yubikey" = "0.5.0"
"aqua:tailscale/tailscale" = "1.96.4"
flux2 = "2.8.5"
gh = "2.89.0"
gitleaks = "8.30.1"
hcloud = "1.62.0"
jq = "1.8.1"
kubectl = "1.35.3"
opentofu = "1.11.6"
"pipx:pre-commit" = "4.5.1"
"pipx:yamllint" = "1.38.0"
"pipx:yubikey-manager" = "5.9.0"
shellcheck = "0.11.0"
sops = "3.12.2"
talosctl = "1.12.6"
yq = "4.52.5"

# --- tofu tasks ---
# All tofu secrets live in a single sops-encrypted YAML file
# (tofu/secrets.sops.yaml) and are injected as env vars via
# `sops decrypt --output-type dotenv`. With YubiKey touch-policy
# "cached" (15s), one touch covers the decrypt for the whole session.
#
# When rops gains age-plugin support (gibbz00/rops#17), replace the
# eval preamble in each task with a single line in [env]:
#   _.file = "tofu/secrets.sops.yaml"

[tasks.tofu-init]
description = "tofu init with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
tofu -chdir=tofu init "$@"
"""

[tasks.tofu-plan]
description = "tofu plan with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
tofu -chdir=tofu plan "$@"
"""

[tasks.tofu-apply]
description = "tofu apply with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
tofu -chdir=tofu apply "$@"
"""

[tasks.tofu-deploy]
description = "Two-pass apply for first deploy or image recreation (ARM/x86 swap, Talos upgrade)"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
echo "==> pass 1: create image"
tofu -chdir=tofu apply -auto-approve \
  -target=talos_image_factory_schematic.shire \
  -target=imager_image.shire
echo "==> pass 2: converge everything"
tofu -chdir=tofu apply "$@"
"""

[tasks.tofu-destroy]
description = "Destroy all tofu-managed resources"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
tofu -chdir=tofu destroy "$@"
"""

[tasks.tofu-secrets-sync]
description = "Render runtime tofu outputs as cluster Secrets, encrypted in place by SOPS"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
target=clusters/shire/infrastructure/controllers/cloudflared-tunnel-token.sops.yaml
token=$(tofu -chdir=tofu output -raw tunnel_token)
printf '%s' "$token" | kubectl create secret generic cloudflared-tunnel-token \
  --namespace=cloudflared \
  --from-file=cf-tunnel-token=/dev/stdin \
  --dry-run=client -o yaml > "$target"
sops --encrypt --in-place "$target"
echo "wrote $target"
echo "review with: git diff -- $target"
"""

[tasks.tofu-output]
description = "Decrypt state and dump a tofu output to stdout"
dir = "{{config_root}}"
run = """
set -euo pipefail
set -a
eval "$(sops decrypt --output-type dotenv tofu/secrets.sops.yaml)"
set +a
tofu -chdir=tofu output -raw "$@"
"""

[tasks.flux-bootstrap]
description = "Bootstrap Flux into the freshly-built cluster against this repo"
dir = "{{config_root}}"
run = """
set -euo pipefail
flux bootstrap github \
  --owner=itay-raveh \
  --repository=infra \
  --path=clusters/shire \
  --personal \
  --branch=main
"""

[tasks.cluster-seed-sops-age]
description = "Install the cluster age key as the sops-age Secret in flux-system"
dir = "{{config_root}}"
run = """
set -euo pipefail
sops --decrypt bootstrap/cluster-age-key.sops.txt \
  | kubectl create secret generic sops-age \
      -n flux-system \
      --from-file=age.agekey=/dev/stdin
"""
