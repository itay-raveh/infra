min_version = "2026.4.8"

[env]
TF_VAR_ssh_public_key_path = "~/.ssh/id_ed25519_sk.pub"

[tools]
age = "1"
# 0.5.0 is the last upstream release with a Linux binary
"aqua:str4d/age-plugin-yubikey" = "0.5.0"
"aqua:tailscale/tailscale" = "1"
flux2 = "2.8"
gh = "2"
gitleaks = "8"
hcloud = "1"
jq = "1"
kubectl = "1.35"
mc = "RELEASE.2025-08-13T08-35-41Z"
opentofu = "1.11"
"pipx:pre-commit" = "4"
"pipx:yamllint" = "1"
"pipx:yubikey-manager" = "5"
shellcheck = "0.11"
sops = "3"
talosctl = "1.12"
yq = "4"

# -- Tofu ---------------------------------------------------------
# All secrets live in tofu/secrets.sops.yaml and are injected as env
# vars via scripts/tofu-wrapper.sh
#
# When rops gains age-plugin support (gibbz00/rops#17), replace the
# wrapper with a single line in [env]:
#   _.file = "tofu/secrets.sops.yaml"

[tasks."tofu:init"]
description = "tofu init with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh init \"$@\""

[tasks."tofu:plan"]
description = "tofu plan with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh plan \"$@\""

[tasks."tofu:apply"]
description = "tofu apply with secrets unwrapped from SOPS"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh apply \"$@\""

[tasks."tofu:destroy"]
description = "Destroy all tofu-managed resources"
dir = "{{config_root}}"
confirm = "This will destroy ALL tofu-managed infrastructure. Continue?"
run = "bash scripts/tofu-wrapper.sh destroy \"$@\""

[tasks."tofu:output"]
description = "Decrypt state and dump a tofu output to stdout"
dir = "{{config_root}}"
run = "bash scripts/tofu-wrapper.sh output -raw \"$@\""

# -- Flux ---------------------------------------------------------

[tasks.reconcile]
description = "Force Flux to pull from git"
run = "flux reconcile source git flux-system && flux reconcile kustomization flux-system"

[tasks."flux:sync-hr"]
description = "Sync a single HelmRelease (usage: mise run flux:sync-hr -- -n <namespace> <name>)"
run = "flux reconcile helmrelease \"$@\""

[tasks."flux:sync-ks"]
description = "Sync a single Kustomization"
run = "flux reconcile kustomization \"$@\""

[tasks."flux:unhealthy"]
description = "Show Flux resources not ready"
run = "flux get all -A --status-selector ready=false"

# -- Cluster inspection -------------------------------------------

[tasks.nodes]
description = "List cluster nodes"
run = "kubectl get nodes -o wide"

[tasks.pods]
description = "List all pods across namespaces"
run = "kubectl get pods -A"

[tasks.unhealthy]
description = "Show pods not in Running/Succeeded state"
run = "kubectl get pods -A --field-selector status.phase!=Running,status.phase!=Succeeded"

[tasks."prune:pods"]
description = "Delete Failed/Succeeded pods"
run = [
    "kubectl delete pods -A --field-selector status.phase==Failed --ignore-not-found",
    "kubectl delete pods -A --field-selector status.phase==Succeeded --ignore-not-found",
]

[tasks.klogs]
description = "Tail logs for a deployment (usage: mise run klogs -- -n <namespace> deploy/<name>)"
run = "kubectl logs -f --all-containers \"$@\""
raw = true

[tasks.kshell]
description = "Open a debug shell on a node (usage: mise run kshell -- <node-name>)"
run = "kubectl debug -it --image=alpine \"node/$1\" -- sh"
raw = true

# -- Tunnel -------------------------------------------------------

[tasks."tunnel:refresh"]
description = "Regenerate tunnel token from tofu, encrypt, commit, and push"
dir = "{{config_root}}"
run = """
target=clusters/shire/infrastructure/controllers/cloudflared-tunnel-token.sops.yaml
token=$(bash scripts/tofu-wrapper.sh output -raw tunnel_token)
printf '%s' "$token" | kubectl create secret generic cloudflared-tunnel-token \
  --namespace=cloudflared \
  --from-file=cf-tunnel-token=/dev/stdin \
  --dry-run=client -o yaml > "$target"
sops --encrypt --in-place "$target"
git add "$target"
git commit -m "chore: refresh tunnel token"
git push
"""

# -- Rebuild ------------------------------------------------------

[tasks.rebuild]
description = "Full rebuild: image + infra + tunnel token + Flux + SOPS age key"
dir = "{{config_root}}"
confirm = "This will tear down and rebuild the entire cluster. Continue?"
file = "scripts/rebuild.sh"
