services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    environment:
      # Traefik's Docker provider doesn't call NegotiateAPIVersion, so the
      # embedded Go client falls back to its compiled default (1.24) which
      # Docker 29+ rejects (min 1.40). Pin to a modern version the daemon
      # accepts.
      DOCKER_API_VERSION: "1.44"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik
      - --entrypoints.web.address=:80
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: traefik
